services:
  - type: web
    name: fashion-stock-backend
    runtime: node
    plan: free
    branch: master
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/auth/login
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "20"

  - type: web
    name: fashion-stock-frontend
    runtime: static
    plan: free
    branch: master
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: NODE_VERSION
        value: "20"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
